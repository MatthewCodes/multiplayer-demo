<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔫 Multiplayer Arena Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #ui {
    position: fixed; top: 0; right: 0; padding: 15px 20px;
    color: #fff; font-size: 14px; text-align: right;
    pointer-events: none; text-shadow: 0 0 6px rgba(0,0,0,0.8);
  }
  #ui div { margin: 4px 0; }
  .label { color: #888; }
  .value { color: #0ff; font-weight: bold; }
  .health { color: #0f0; }
  .health.low { color: #f44; }

  /* Scoreboard (top center) */
  #scoreboard {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    display: none; color: #fff; font-size: 14px; pointer-events: none;
    background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 8px;
    text-shadow: 0 0 6px rgba(0,0,0,0.8); min-width: 200px;
  }
  #scoreboard .title { color: #888; font-size: 11px; letter-spacing: 2px; text-align: center; margin-bottom: 4px; }
  #scoreboard .row { display: flex; justify-content: space-between; gap: 18px; padding: 1px 0; }
  #scoreboard .row.me { color: #ff0; font-weight: bold; }
  #scoreboard .frags { color: #0ff; font-weight: bold; }

  /* Kill feed (top left) */
  #killfeed {
    position: fixed; top: 12px; left: 12px; color: #ddd; font-size: 13px;
    pointer-events: none; text-shadow: 0 0 6px rgba(0,0,0,0.9); line-height: 1.7;
  }
  #killfeed .k { color: #fff; font-weight: bold; }
  #killfeed .arrow { color: #f44; margin: 0 6px; }
  #killfeed .v { color: #aaa; }

  #crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 24px; height: 24px; pointer-events: none; display: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255, 255, 255, 0.7);
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
  #crosshair .dot {
    position: absolute; width: 4px; height: 4px; border-radius: 50%;
    background: #f44; top: 50%; left: 50%; transform: translate(-50%, -50%);
  }

  #overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(0, 0, 0, 0.88); color: #fff; z-index: 10;
  }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: 44px; color: #f44; text-shadow: 0 0 30px #f44; margin-bottom: 12px; }
  #overlay .subtitle { font-size: 15px; color: #aaa; margin-bottom: 22px; text-align: center; line-height: 1.6; }
  #overlay .stat { font-size: 18px; color: #ff0; margin: 5px; }
  #overlay input {
    width: 280px; padding: 12px 14px; font-family: 'Courier New', monospace; font-size: 18px;
    background: #111; color: #0ff; border: 2px solid #0ff; text-align: center; margin-bottom: 16px; outline: none;
  }
  #overlay button {
    padding: 14px 50px; font-family: 'Courier New', monospace; font-size: 20px;
    background: transparent; color: #f44; border: 2px solid #f44; cursor: pointer; transition: all 0.2s;
  }
  #overlay button:hover { background: #f44; color: #000; }

  #hit-marker {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 30px; height: 30px; pointer-events: none; display: none;
  }
  #hit-marker::before, #hit-marker::after { content: ''; position: absolute; background: #fff; }
  #hit-marker::before { width: 100%; height: 2px; top: 50%; transform: translateY(-50%) rotate(45deg); }
  #hit-marker::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%) rotate(-45deg); }

  #damage-flash {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.35) 100%);
    pointer-events: none; opacity: 0; transition: opacity 0.1s;
  }

  #weapon-info { position: fixed; bottom: 20px; left: 20px; color: #fff; font-size: 20px; pointer-events: none; text-shadow: 0 0 8px rgba(0,0,0,0.9); display: none; }
  #weapon-info .weapon-name { color: #f80; font-size: 24px; font-weight: bold; }
  #weapon-info .ammo-count { color: #ff0; font-size: 32px; }
  #weapon-info .ammo-max { color: #888; font-size: 18px; }

  #notification {
    position: fixed; top: 58%; left: 50%; transform: translateX(-50%);
    color: #0f0; font-size: 18px; font-weight: bold; pointer-events: none;
    opacity: 0; transition: opacity 0.3s; text-shadow: 0 0 10px #0f0; text-align: center;
  }

  /* Center banner: respawn / win */
  #banner {
    position: fixed; top: 42%; left: 50%; transform: translate(-50%,-50%);
    z-index: 8; text-align: center; pointer-events: none; opacity: 0;
    transition: opacity .2s; color: #fff; text-shadow: 0 0 24px rgba(0,0,0,.8);
  }
  #banner.show { opacity: 1; }
  #banner .big { font-size: 52px; font-weight: bold; }
  #banner .sub { font-size: 18px; color: #ccc; margin-top: 8px; }
  #status { position: fixed; bottom: 20px; right: 20px; color: #ff0; font-size: 12px; pointer-events: none; }
</style>
</head>
<body>
<div id="crosshair"><div class="dot"></div></div>
<div id="hit-marker"></div>
<div id="damage-flash"></div>
<div id="ui"></div>
<div id="scoreboard"></div>
<div id="killfeed"></div>
<div id="weapon-info"></div>
<div id="notification"></div>
<div id="banner"></div>
<div id="status"></div>
<div id="overlay">
  <h1>🔫 ARENA SHOOTER</h1>
  <div class="subtitle">
    Free-for-all deathmatch. <b>WASD</b> move · <b>Mouse</b> aim · <b>Click/Space</b> shoot · <b>Q</b> switch weapon.<br>
    Grab the orange box for a machine gun. First to 10 frags wins.
  </div>
  <input id="name" type="text" placeholder="Your name" maxlength="16" autocomplete="off">
  <div class="stat" id="final-score"></div>
  <button id="start-btn">JOIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============ Core Setup ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);
scene.fog = new THREE.FogExp2(0x111122, 0.008);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ============ Lighting ============
scene.add(new THREE.AmbientLight(0x333355, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(50, 80, 50);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 1; dirLight.shadow.camera.far = 200;
dirLight.shadow.camera.left = -80; dirLight.shadow.camera.right = 80;
dirLight.shadow.camera.top = 80; dirLight.shadow.camera.bottom = -80;
scene.add(dirLight);
scene.add(new THREE.HemisphereLight(0x444466, 0x222222, 0.4));

// ============ Game State ============
let ARENA = 40, BOUND = 38, FRAG_LIMIT = 10, MAX_HEALTH = 100;
let joined = false, mode = "playing";
let playerHealth = 100;
let alive = true;
let currentWeapon = 'pistol';
let pistolAmmo = 30, pistolMaxAmmo = 30;
let mgAmmo = 0, mgMaxAmmo = 120;

const bullets = [];     // purely-visual tracers (local + remote)
const particles = [];
const walls = [];
const pickups = [];

const keys = {};
let mouseDown = false;
let yaw = 0, pitch = 0;
let pointerLocked = false;

// ============ Player ============
const player = {
  position: new THREE.Vector3(0, 3, 0),
  speed: 15, height: 3, radius: 1, shootCooldown: 0,
};
camera.position.copy(player.position);
camera.rotation.order = 'YXZ';

// ============ Arena (deterministic so every client matches) ============
function buildArena(size) {
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(size * 2, size * 2, 32, 32),
    new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.9, metalness: 0.1 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);
  scene.add(new THREE.GridHelper(size * 2, 40, 0x444466, 0x222233));

  const wallHeight = 12, wallThickness = 2;
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x555588, roughness: 0.7, metalness: 0.3 });
  const wallConfigs = [
    { pos: [0, wallHeight / 2, -size], size: [size * 2, wallHeight, wallThickness] },
    { pos: [0, wallHeight / 2, size], size: [size * 2, wallHeight, wallThickness] },
    { pos: [-size, wallHeight / 2, 0], size: [wallThickness, wallHeight, size * 2] },
    { pos: [size, wallHeight / 2, 0], size: [wallThickness, wallHeight, size * 2] },
  ];
  wallConfigs.forEach(cfg => {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(...cfg.size), wallMat);
    wall.position.set(...cfg.pos);
    wall.castShadow = true; wall.receiveShadow = true;
    scene.add(wall);
    walls.push({ mesh: wall, box: new THREE.Box3().setFromObject(wall) });
  });

  // Fixed cover layout (identical on every client).
  const obstacleMat = new THREE.MeshStandardMaterial({ color: 0x666699, roughness: 0.5, metalness: 0.4 });
  const obstacles = [
    [15, 10, 4, 4, 4], [-15, 10, 4, 3, 6], [15, -12, 6, 3, 4], [-15, -12, 4, 4, 4],
    [25, 0, 3, 5, 8], [-25, 0, 3, 5, 8], [0, 22, 8, 3, 3], [0, -22, 8, 3, 3],
    [12, 25, 4, 4, 4], [-12, 25, 4, 4, 4], [12, -25, 4, 4, 4], [-12, -25, 4, 4, 4],
  ];
  obstacles.forEach(([x, z, w, h, d]) => {
    const o = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), obstacleMat);
    o.position.set(x, h / 2, z);
    o.castShadow = true; o.receiveShadow = true;
    scene.add(o);
    walls.push({ mesh: o, box: new THREE.Box3().setFromObject(o) });
  });

  const pillarMat = new THREE.MeshStandardMaterial({ color: 0x777799, roughness: 0.3, metalness: 0.6 });
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2, dist = size * 0.6;
    const pillar = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 8, 12), pillarMat);
    pillar.position.set(Math.cos(a) * dist, 4, Math.sin(a) * dist);
    pillar.castShadow = true; pillar.receiveShadow = true;
    scene.add(pillar);
    walls.push({ mesh: pillar, box: new THREE.Box3().setFromObject(pillar) });
  }
}
buildArena(ARENA);

// ============ Weapon Model (first person) ============
let weaponGroup;
function createWeaponModel(type) {
  if (weaponGroup) camera.remove(weaponGroup);
  weaponGroup = new THREE.Group();
  if (type === 'pistol') {
    const slide = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.1, 0.5),
      new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.7, roughness: 0.3 }));
    slide.position.set(0, 0, -0.1); weaponGroup.add(slide);
    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.18, 0.15),
      new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5, roughness: 0.5 }));
    grip.position.set(0, -0.12, 0.15); grip.rotation.x = 0.2; weaponGroup.add(grip);
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.08, 8),
      new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.2 }));
    barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0, -0.38); weaponGroup.add(barrel);
  } else {
    const recv = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.14, 0.7),
      new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.6, roughness: 0.4 }));
    weaponGroup.add(recv);
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.5, 8),
      new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.8, roughness: 0.2 }));
    barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0, -0.55); weaponGroup.add(barrel);
    const mag = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.25, 0.12),
      new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5, roughness: 0.5 }));
    mag.position.set(0, -0.18, -0.05); weaponGroup.add(mag);
    const stock = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.08, 0.3),
      new THREE.MeshStandardMaterial({ color: 0x4a3520, metalness: 0.1, roughness: 0.8 }));
    stock.position.set(0, -0.02, 0.45); weaponGroup.add(stock);
  }
  weaponGroup.position.set(0.28, -0.22, -0.45);
  camera.add(weaponGroup);
}
createWeaponModel('pistol');
scene.add(camera); // so the weapon (child of camera) renders

// ============ Remote players ============
const others = new Map(); // id -> { group, body, target:{x,z,ry}, name, color }

function makeNameTag(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = "bold 30px 'Courier New', monospace";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, 256, 64);
  ctx.fillStyle = color; ctx.fillText(text, 128, 34);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
  sprite.scale.set(4, 1, 1); sprite.position.y = 5.2;
  return sprite;
}

function makeAvatar(color, name) {
  const group = new THREE.Group();
  const col = new THREE.Color(color);
  const bodyMat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.6, metalness: 0.3 });
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.6, 2.5, 8), bodyMat);
  body.position.y = 2.25; body.castShadow = true; group.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 10, 10),
    new THREE.MeshStandardMaterial({ color: 0xddaa88, roughness: 0.7 }));
  head.position.y = 3.9; head.castShadow = true; group.add(head);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 2 });
  for (const sx of [-0.18, 0.18]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), eyeMat);
    eye.position.set(sx, 4.0, -0.4); group.add(eye);
  }
  const gun = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.6),
    new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.7 }));
  gun.position.set(0.6, 2.8, -0.3); group.add(gun);
  group.add(makeNameTag(name, color));
  scene.add(group);
  return { group, body, bodyMat };
}

// ============ Networking ============
let ws = null, myId = null, myColor = '#40c4ff';
const statusEl = document.getElementById('status');

function connect(name) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => { statusEl.textContent = 'connected'; ws.send(JSON.stringify({ type: 'join', name })); };
  ws.onclose = () => { statusEl.textContent = 'disconnected — reload to retry'; statusEl.style.color = '#f44'; };

  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    switch (msg.type) {
      case 'init':
        myId = msg.id; myColor = msg.color;
        ARENA = msg.arena; BOUND = msg.arena - 2; FRAG_LIMIT = msg.fragLimit; MAX_HEALTH = msg.maxHealth;
        snapTo(msg.spawn);
        break;
      case 'state': handleState(msg); break;
      case 'damaged': onDamaged(); break;
      case 'death': onDeath(msg); break;
      case 'respawn':
        if (msg.id === myId) { snapTo({ x: msg.x, z: msg.z }); alive = true; playerHealth = MAX_HEALTH; hideBanner(); }
        break;
      case 'shoot': remoteShot(msg); break;
      case 'gameover': onGameOver(msg); break;
      case 'newmatch':
        mode = 'playing';
        if (msg.spawns && msg.spawns[myId]) snapTo(msg.spawns[myId]);
        alive = true; playerHealth = MAX_HEALTH; hideBanner();
        break;
      case 'left': {
        const o = others.get(msg.id);
        if (o) { scene.remove(o.group); others.delete(msg.id); }
        break;
      }
    }
  };
}

function snapTo(spawn) {
  if (!spawn) return;
  player.position.set(spawn.x, 3, spawn.z);
  camera.position.copy(player.position);
}

function handleState(msg) {
  mode = msg.mode;
  const seen = new Set();
  for (const p of msg.players) {
    if (p.id === myId) {
      // Server owns our health / alive / frags.
      playerHealth = p.health;
      alive = p.alive;
      seen.add(p.id);
      continue;
    }
    seen.add(p.id);
    let o = others.get(p.id);
    if (!o) { o = makeAvatar(p.color, p.name); o.target = {}; others.set(p.id, o); o.group.position.set(p.x, 0, p.z); }
    o.target.x = p.x; o.target.z = p.z; o.target.ry = p.ry; o.alive = p.alive;
    o.group.visible = p.alive;
  }
  for (const [id, o] of others) {
    if (!seen.has(id)) { scene.remove(o.group); others.delete(id); }
  }
  renderScoreboard(msg.players);
}

// ============ Shooting (client-authoritative raycast vs other players) ============
function shoot() {
  if (!alive || mode !== 'playing') return;
  let ammo, cooldown, damage;
  if (currentWeapon === 'pistol') { ammo = pistolAmmo; cooldown = 0.2; damage = 20; }
  else { ammo = mgAmmo; cooldown = 0.08; damage = 15; }
  if (ammo <= 0) return;

  if (currentWeapon === 'pistol') pistolAmmo--; else mgAmmo--;
  player.shootCooldown = cooldown;

  createMuzzleFlash();

  const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
  if (currentWeapon === 'machinegun') {
    dir.x += (Math.random() - 0.5) * 0.03;
    dir.y += (Math.random() - 0.5) * 0.03;
    dir.z += (Math.random() - 0.5) * 0.03;
  }
  dir.normalize();

  // Hit detection against other players' meshes.
  const meshes = [];
  for (const o of others.values()) if (o.alive !== false) meshes.push(o.group);
  const raycaster = new THREE.Raycaster(camera.position.clone(), dir, 0, 200);
  const hits = raycaster.intersectObjects(meshes, true);

  // Visual tracer + relay to other clients.
  spawnTracer(camera.position.clone(), dir, 0xffff00);
  if (ws && ws.readyState === 1) {
    const o = camera.position;
    ws.send(JSON.stringify({ type: 'shoot', ox: +o.x.toFixed(1), oy: +o.y.toFixed(1), oz: +o.z.toFixed(1),
      dx: +dir.x.toFixed(3), dy: +dir.y.toFixed(3), dz: +dir.z.toFixed(3), w: currentWeapon }));
  }

  if (hits.length > 0) {
    // Make sure we didn't hit a wall first (walls aren't in `meshes`, so any
    // hit here is a player) — but still respect line-of-sight on cover.
    const playerDist = hits[0].distance;
    const wallRc = new THREE.Raycaster(camera.position.clone(), dir, 0, playerDist - 0.1);
    const wallHit = wallRc.intersectObjects(walls.map(w => w.mesh), false);
    if (wallHit.length === 0) {
      const targetId = findOwner(hits[0].object);
      if (targetId != null) {
        showHitMarker();
        spawnParticles(hits[0].point, 0xff4400, 8);
        if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'hit', target: targetId, damage }));
      }
    }
  }

  // Recoil
  if (weaponGroup) {
    weaponGroup.position.z += 0.05; weaponGroup.rotation.x += 0.05;
    setTimeout(() => { if (weaponGroup) { weaponGroup.position.z = -0.45; weaponGroup.rotation.x = 0; } }, 50);
  }
}

function findOwner(obj) {
  for (const [id, o] of others) {
    let cur = obj;
    while (cur) { if (cur === o.group) return id; cur = cur.parent; }
  }
  return null;
}

function remoteShot(msg) {
  const origin = new THREE.Vector3(msg.ox, msg.oy, msg.oz);
  const dir = new THREE.Vector3(msg.dx, msg.dy, msg.dz);
  spawnTracer(origin, dir, 0xff8800);
  // little muzzle flash at the shooter
  const flash = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffdd44, transparent: true, opacity: 0.9 }));
  flash.position.copy(origin).add(dir.clone().multiplyScalar(0.6));
  scene.add(flash);
  particles.push({ mesh: flash, life: 0.05, maxLife: 0.05, isMuzzle: true });
}

function spawnTracer(origin, dir, color) {
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), new THREE.MeshBasicMaterial({ color }));
  mesh.position.copy(origin);
  mesh.add(new THREE.PointLight(0xffaa00, 2, 5));
  scene.add(mesh);
  bullets.push({ mesh, direction: dir.clone().normalize(), speed: 120, life: 1.2 });
}

function createMuzzleFlash() {
  const flash = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffdd44, transparent: true, opacity: 0.9 }));
  const worldPos = new THREE.Vector3(0.28, -0.2, -0.85).applyQuaternion(camera.quaternion);
  flash.position.copy(camera.position).add(worldPos);
  scene.add(flash);
  particles.push({ mesh: flash, life: 0.05, maxLife: 0.05, isMuzzle: true });
}

function spawnParticles(pos, color, count) {
  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.1 + Math.random() * 0.15, 4, 4),
      new THREE.MeshBasicMaterial({ color, transparent: true }));
    mesh.position.copy(pos); scene.add(mesh);
    particles.push({
      mesh,
      velocity: new THREE.Vector3((Math.random() - 0.5) * 8, Math.random() * 6, (Math.random() - 0.5) * 8),
      life: 0.5 + Math.random() * 0.5, gravity: true,
    });
  }
}

// ============ Pickups (local, fixed positions, respawn over time) ============
function makePickup(def) {
  let geo, color, emissive;
  if (def.type === 'machinegun') { geo = new THREE.BoxGeometry(0.6, 0.3, 1.0); color = 0xff8800; emissive = 0xff4400; }
  else if (def.type === 'health') { geo = new THREE.BoxGeometry(0.5, 0.5, 0.5); color = 0x00ff00; emissive = 0x00aa00; }
  else { geo = new THREE.BoxGeometry(0.5, 0.3, 0.4); color = 0xffff00; emissive = 0xffaa00; }
  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color, emissive, emissiveIntensity: 0.4, metalness: 0.5 }));
  mesh.position.set(def.x, 1, def.z); mesh.castShadow = true;
  const ring = new THREE.Mesh(new THREE.RingGeometry(0.6, 0.8, 16),
    new THREE.MeshBasicMaterial({ color: emissive, transparent: true, opacity: 0.4, side: THREE.DoubleSide }));
  ring.rotation.x = -Math.PI / 2; ring.position.y = -0.7; mesh.add(ring);
  scene.add(mesh);
  pickups.push({ mesh, type: def.type, x: def.x, z: def.z, collected: false, readyAt: 0, bob: Math.random() * Math.PI * 2 });
}
[
  { type: 'machinegun', x: 20, z: 20 }, { type: 'machinegun', x: -20, z: -20 },
  { type: 'health', x: 20, z: -20 }, { type: 'health', x: -20, z: 20 },
  { type: 'ammo', x: 0, z: 16 }, { type: 'ammo', x: 0, z: -16 },
  { type: 'ammo', x: 16, z: 0 }, { type: 'ammo', x: -16, z: 0 },
].forEach(makePickup);

function collectPickup(p) {
  p.collected = true; p.mesh.visible = false; p.readyAt = performance.now() + 15000;
  if (p.type === 'machinegun') {
    currentWeapon = 'machinegun'; createWeaponModel('machinegun');
    if (mgAmmo === 0) mgAmmo = mgMaxAmmo;
    showNotification('💥 MACHINE GUN ACQUIRED!');
  } else if (p.type === 'ammo') {
    if (currentWeapon === 'pistol') pistolAmmo = Math.min(pistolAmmo + 15, pistolMaxAmmo);
    else mgAmmo = Math.min(mgAmmo + 40, mgMaxAmmo);
    showNotification('📦 AMMO REFILLED');
  } else {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'heal', amount: 25 }));
    showNotification('❤️ HEALTH RESTORED');
  }
}

// ============ HUD helpers ============
function showHitMarker() { const hm = document.getElementById('hit-marker'); hm.style.display = 'block'; setTimeout(() => hm.style.display = 'none', 80); }
function onDamaged() { const df = document.getElementById('damage-flash'); df.style.opacity = '1'; setTimeout(() => df.style.opacity = '0', 150); }
function showNotification(t) { const n = document.getElementById('notification'); n.textContent = t; n.style.opacity = '1'; setTimeout(() => n.style.opacity = '0', 1400); }

const bannerEl = document.getElementById('banner');
function showBanner(html) { bannerEl.innerHTML = html; bannerEl.classList.add('show'); }
function hideBanner() { bannerEl.classList.remove('show'); }

const killfeedEl = document.getElementById('killfeed');
const killfeed = [];
function onDeath(msg) {
  killfeed.push({ text: `<span class="k">${msg.killerName}</span><span class="arrow">▸</span><span class="v">${msg.victimName}</span>`, t: performance.now() });
  if (killfeed.length > 5) killfeed.shift();
  renderKillfeed();
  if (msg.victim === myId) {
    alive = false;
    showBanner(`<div class="big" style="color:#f44">FRAGGED</div><div class="sub">${msg.killerName} got you · respawning…</div>`);
  }
}
function renderKillfeed() {
  killfeedEl.innerHTML = killfeed.map(k => `<div>${k.text}</div>`).join('');
}

function renderScoreboard(plist) {
  const el = document.getElementById('scoreboard');
  const sorted = [...plist].sort((a, b) => b.frags - a.frags);
  el.innerHTML = `<div class="title">DEATHMATCH · FIRST TO ${FRAG_LIMIT}</div>` +
    sorted.map(p => `<div class="row ${p.id === myId ? 'me' : ''}">
      <span>${p.id === myId ? '▸ ' : ''}${p.name}</span><span class="frags">${p.frags}</span></div>`).join('');
}

function onGameOver(msg) {
  mode = 'gameover';
  const win = msg.winner === myId;
  showBanner(`<div class="big" style="color:${win ? '#0f0' : '#ff0'}">${win ? 'YOU WIN! 🏆' : msg.winnerName + ' WINS'}</div>` +
    `<div class="sub">new match starting…</div>`);
}

// ============ Update & Render ============
let lastTime = performance.now();
function update() {
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;

  // Look
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // Movement (only when alive + match live)
  if (joined && alive && mode === 'playing') {
    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0, yaw, 0)));
    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0, yaw, 0)));
    forward.y = 0; right.y = 0; forward.normalize(); right.normalize();
    const moveDir = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp']) moveDir.add(forward);
    if (keys['KeyS'] || keys['ArrowDown']) moveDir.sub(forward);
    if (keys['KeyA'] || keys['ArrowLeft']) moveDir.sub(right);
    if (keys['KeyD'] || keys['ArrowRight']) moveDir.add(right);
    if (moveDir.length() > 0) { moveDir.normalize(); player.position.add(moveDir.multiplyScalar(player.speed * dt)); }

    player.position.x = Math.max(-BOUND, Math.min(BOUND, player.position.x));
    player.position.z = Math.max(-BOUND, Math.min(BOUND, player.position.z));
    player.position.y = 3;

    // Push out of walls/obstacles.
    const pbox = new THREE.Box3().setFromCenterAndSize(player.position, new THREE.Vector3(player.radius * 2, player.height, player.radius * 2));
    for (const wall of walls) {
      if (pbox.intersectsBox(wall.box)) {
        const c = new THREE.Vector3(); wall.box.getCenter(c);
        const push = player.position.clone().sub(c); push.y = 0; push.normalize();
        player.position.add(push.multiplyScalar(0.3));
      }
    }

    // Shooting
    player.shootCooldown -= dt;
    if ((keys['Space'] || mouseDown) && player.shootCooldown <= 0) shoot();

    // Weapon switch
    if (keys['KeyQ']) {
      keys['KeyQ'] = false;
      if (currentWeapon === 'pistol' && mgAmmo > 0) { currentWeapon = 'machinegun'; createWeaponModel('machinegun'); }
      else if (currentWeapon === 'machinegun') { currentWeapon = 'pistol'; createWeaponModel('pistol'); }
    }

    // Pickups
    for (const p of pickups) {
      if (p.collected) continue;
      if (player.position.distanceTo(p.mesh.position) < 3) collectPickup(p);
    }
  }
  camera.position.copy(player.position);

  // Send our position/look to the server (~20 Hz)
  if (joined && ws && ws.readyState === 1 && now - update._lastSent > 50) {
    ws.send(JSON.stringify({ type: 'input', x: +player.position.x.toFixed(2), z: +player.position.z.toFixed(2), ry: +yaw.toFixed(3), rx: +pitch.toFixed(3) }));
    update._lastSent = now;
  }

  // Respawn pickups
  for (const p of pickups) {
    if (p.collected && now >= p.readyAt) { p.collected = false; p.mesh.visible = true; }
    if (!p.collected) { p.mesh.rotation.y += dt; p.mesh.position.y = 1 + Math.sin(now / 500 + p.bob) * 0.3; }
  }

  // Interpolate remote players
  for (const o of others.values()) {
    if (!o.target) continue;
    o.group.position.x += (o.target.x - o.group.position.x) * 0.2;
    o.group.position.z += (o.target.z - o.group.position.z) * 0.2;
    let diff = o.target.ry - o.group.rotation.y;
    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
    o.group.rotation.y += diff * 0.2;
  }

  // Bullet tracers
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.mesh.position.add(b.direction.clone().multiplyScalar(b.speed * dt));
    b.life -= dt;
    let hitWall = false;
    for (const wall of walls) { if (wall.box.containsPoint(b.mesh.position)) { hitWall = true; spawnParticles(b.mesh.position.clone(), 0x888888, 4); break; } }
    if (b.life <= 0 || hitWall) { scene.remove(b.mesh); bullets.splice(i, 1); }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.life -= dt;
    if (p.velocity) { if (p.gravity) p.velocity.y -= 15 * dt; p.mesh.position.add(p.velocity.clone().multiplyScalar(dt)); p.mesh.material.opacity = p.life; }
    else if (p.isMuzzle) p.mesh.material.opacity = p.life / p.maxLife;
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
  }

  updateUI();
}
update._lastSent = 0;

function updateUI() {
  const ui = document.getElementById('ui');
  const cls = playerHealth < 30 ? 'health low' : 'health';
  ui.innerHTML = `<div><span class="label">HP</span> <span class="${cls}">${Math.max(0, playerHealth)}%</span></div>
    <div><span class="label">FRAG LIMIT</span> <span class="value">${FRAG_LIMIT}</span></div>`;
  const wi = document.getElementById('weapon-info');
  if (currentWeapon === 'pistol') wi.innerHTML = `<div class="weapon-name">PISTOL</div><div><span class="ammo-count">${pistolAmmo}</span> <span class="ammo-max">/ ${pistolMaxAmmo}</span></div>`;
  else wi.innerHTML = `<div class="weapon-name">MACHINE GUN</div><div><span class="ammo-count">${mgAmmo}</span> <span class="ammo-max">/ ${mgMaxAmmo}</span></div>`;
}

function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }
animate();

// ============ Events ============
document.addEventListener('keydown', e => { keys[e.code] = true; if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });
document.addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
document.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });
document.addEventListener('mousemove', e => {
  if (!pointerLocked) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
});
document.addEventListener('pointerlockchange', () => { pointerLocked = document.pointerLockElement === renderer.domElement; });
window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

// ============ Join flow ============
const overlay = document.getElementById('overlay');
const nameInput = document.getElementById('name');
function joinGame() {
  if (joined) return;
  const name = (nameInput.value || '').trim() || 'Anonymous';
  joined = true;
  overlay.classList.add('hidden');
  document.getElementById('crosshair').style.display = 'block';
  document.getElementById('weapon-info').style.display = 'block';
  document.getElementById('scoreboard').style.display = 'block';
  connect(name);
  renderer.domElement.requestPointerLock();
}
document.getElementById('start-btn').addEventListener('click', joinGame);
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });
// Re-lock the pointer on click after pressing Esc.
renderer.domElement.addEventListener('click', () => { if (joined && !pointerLocked) renderer.domElement.requestPointerLock(); });
nameInput.focus();
</script>
